<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OX 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Pretendard',sans-serif;background:linear-gradient(135deg,#faf5ff,#f3e8ff,#f8f0ff);min-height:100vh;color:#1e1b4b;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
.center{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;flex:1;padding:clamp(20px,5vh,52px) 20px 24px;text-align:center;}
.title{font-size:2.4rem;font-weight:900;background:linear-gradient(90deg,#9333ea,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.sub{color:rgba(109,40,217,.6);margin-bottom:24px;font-size:.95rem;}
.btn{padding:13px 30px;border:none;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .18s;}
.btn:hover{transform:translateY(-2px);filter:brightness(1.12);}
.btn-pri{background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;box-shadow:0 4px 18px rgba(147,51,234,.35);}
.btn-ghost{background:transparent;color:rgba(109,40,217,.55);border:1px solid rgba(147,51,234,.25);}
.btn-danger{background:linear-gradient(135deg,#ff416c,#ff4b2b);color:#fff;}
.card{background:rgba(255,255,255,.75);border:1px solid rgba(147,51,234,.22);border-radius:20px;padding:28px;width:100%;max-width:460px;backdrop-filter:blur(10px);}
.inp{width:100%;padding:13px 20px;border:2px solid rgba(147,51,234,.22);border-radius:50px;background:rgba(255,255,255,.6);color:#1e1b4b;font-size:1rem;outline:none;transition:border-color .2s;}
.inp:focus{border-color:#9333ea;}
.inp::placeholder{color:rgba(109,40,217,.35);}
label{display:block;color:rgba(109,40,217,.65);font-size:.85rem;margin-bottom:7px;text-align:left;}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;width:100%;max-width:400px;}
.mode-btn{padding:36px 16px;border:2px solid rgba(147,51,234,.2);border-radius:20px;background:rgba(255,255,255,.55);color:#1e1b4b;cursor:pointer;font-size:.95rem;font-weight:700;transition:all .2s;}
.mode-btn:hover{border-color:#9333ea;background:rgba(147,51,234,.08);transform:translateY(-4px);}
.mode-icon{font-size:2.8rem;display:block;margin-bottom:10px;}

/* 과목 선택 */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;width:100%;max-width:380px;}
.subj-btn{padding:18px 16px;border:2px solid rgba(147,51,234,.2);border-radius:20px;background:rgba(255,255,255,.55);color:#1e1b4b;cursor:pointer;font-size:.95rem;font-weight:700;transition:all .18s;text-align:center;}
.subj-btn:hover{border-color:#9333ea;background:rgba(147,51,234,.08);transform:translateY(-4px);}
.subj-em{font-size:2.2rem;display:block;margin-bottom:6px;}
.subj-btn.sel{border-color:#9333ea;background:rgba(147,51,234,.14);}
.cnt-grid{display:flex;gap:10px;justify-content:center;margin:14px 0;}
.cnt-btn{padding:12px 22px;border:2px solid rgba(147,51,234,.2);border-radius:50px;background:rgba(255,255,255,.55);color:#1e1b4b;cursor:pointer;font-size:1rem;font-weight:700;transition:all .18s;}
.cnt-btn.sel{border-color:#9333ea;background:rgba(147,51,234,.14);}

.room-code{font-size:4.5rem;font-weight:900;letter-spacing:.18em;background:linear-gradient(90deg,#9333ea,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.room-box{background:rgba(255,255,255,.75);border:1px solid rgba(147,51,234,.22);border-radius:16px;padding:20px 28px;text-align:center;margin:14px 0;width:100%;max-width:420px;}
.player-list{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;justify-content:center;min-height:50px;width:100%;max-width:560px;}
.p-chip{display:flex;align-items:center;gap:6px;background:rgba(147,51,234,.1);border-radius:50px;padding:5px 14px;font-size:.88rem;}

/* 선생님 게임 화면 */
#hostGame{padding:16px;max-width:960px;margin:0 auto;width:100%;}
.hg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.q-info{color:rgba(109,40,217,.55);font-size:.88rem;}
.timer{font-size:4rem;font-weight:900;line-height:1;min-width:80px;text-align:center;}
.timer.urg{color:#ff4b2b;animation:pulse .45s ease infinite alternate;}
@keyframes pulse{to{transform:scale(1.12);}}
.ans-cnt{color:rgba(109,40,217,.55);font-size:.88rem;text-align:right;}
.prog{width:100%;height:7px;background:rgba(147,51,234,.12);border-radius:4px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;background:linear-gradient(90deg,#9333ea,#7c3aed);border-radius:4px;transition:width .6s;}
.q-text{font-size:1.75rem;font-weight:700;text-align:center;line-height:1.4;padding:22px;background:rgba(255,255,255,.75);border:1px solid rgba(147,51,234,.15);border-radius:16px;margin-bottom:14px;}

/* 미니미 필드 */
.field{position:relative;width:100%;height:260px;border-radius:18px;overflow:hidden;margin-bottom:6px;}
.field-bg{position:absolute;inset:0;display:flex;pointer-events:none;}
.fo-bg{flex:1;background:rgba(76,175,80,.22);border:2px solid rgba(76,175,80,.5);border-radius:18px 0 0 18px;}
.fx-bg{flex:1;background:rgba(244,67,54,.22);border:2px solid rgba(244,67,54,.5);border-radius:0 18px 18px 0;}
.f-label{position:absolute;top:8px;font-size:3rem;font-weight:900;opacity:.5;pointer-events:none;}
.f-label-o{left:8%;color:#4CAF50;}
.f-label-x{right:8%;color:#f44336;}
.field-center-line{position:absolute;left:50%;top:10%;bottom:10%;width:2px;background:rgba(147,51,234,.2);transform:translateX(-50%);pointer-events:none;}
#miniContainer{position:absolute;inset:0;}

/* 미니미 캐릭터 */
.mc{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  transform:translateX(-50%);
  transition:left .65s cubic-bezier(.34,1.2,.64,1), top .4s ease;
  will-change:left,top;
}
.mc .em{font-size:1.65rem;display:block;line-height:1;}
.mc .mn{font-size:.5rem;color:rgba(109,40,217,.8);max-width:44px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center;}
.mc.cel{animation:jump .42s ease infinite alternate;}
.mc.out{opacity:.2;filter:grayscale(1);}
.mc .changed-dot{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%;background:#ffd700;animation:dotFade 1.5s ease forwards;}
@keyframes jump{to{transform:translateX(-50%) translateY(-9px);}}
@keyframes dotFade{0%{opacity:1;transform:scale(1.5);}100%{opacity:0;transform:scale(0);}}
/* 반짝이 */
.mc.cel .em{filter:drop-shadow(0 0 8px #ffd700);}
.sparkle{position:absolute;pointer-events:none;font-size:.9rem;animation:sparkleUp .7s ease forwards;z-index:10;}
@keyframes sparkleUp{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-22px) scale(.3)}}

/* 미선택 대기줄 */
#pendingRow{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:36px;padding:5px 0;margin-bottom:4px;}
#pendingRow .mc{position:static;transform:none;opacity:.38;transition:opacity .3s;}

.host-btns{text-align:center;margin-top:8px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-reveal{background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;font-size:1.1rem;padding:14px 38px;}
.btn-next{background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;font-size:1.05rem;padding:14px 34px;}
.btn-o{background:linear-gradient(135deg,#56ab2f,#a8e063);color:#fff;font-size:2.4rem;padding:22px 44px;border-radius:20px;border:3px solid transparent;transition:all .2s;}
.btn-x{background:linear-gradient(135deg,#ff416c,#ff4b2b);color:#fff;font-size:2.4rem;padding:22px 44px;border-radius:20px;border:3px solid transparent;transition:all .2s;}
.btn-o.picked{border-color:#fff;box-shadow:0 0 20px rgba(86,171,47,.8);transform:scale(1.07);}
.btn-x.picked{border-color:#fff;box-shadow:0 0 20px rgba(255,65,108,.8);transform:scale(1.07);}

/* 시상대 */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:16px 0;height:210px;}
.pd-slot{display:flex;flex-direction:column;align-items:center;}
.pd-chars{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;min-height:90px;align-items:flex-end;padding-bottom:4px;}
.pd-block{display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:rgba(0,0,0,.7);border-radius:8px 8px 0 0;min-width:90px;}
.pd1{height:120px;background:linear-gradient(135deg,#ffd700,#ffb300);}
.pd2{height:88px;background:linear-gradient(135deg,#c0c0c0,#9e9e9e);}
.pd3{height:68px;background:linear-gradient(135deg,#cd7f32,#a0522d);}
.stats{width:100%;max-width:580px;display:flex;flex-direction:column;gap:7px;}
.st-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.75);border:1px solid rgba(147,51,234,.12);border-radius:12px;padding:11px 15px;}
.st-rank{font-size:1.1rem;font-weight:900;min-width:28px;}
.st-av{font-size:1.4rem;}
.st-name{flex:1;font-weight:700;font-size:.95rem;text-align:left;}
.st-bar{width:90px;height:7px;background:rgba(147,51,234,.12);border-radius:4px;overflow:hidden;}
.st-fill{height:100%;background:linear-gradient(90deg,#e8631a,#b83510);border-radius:4px;}
.st-sc{font-size:1rem;font-weight:700;color:#9333ea;min-width:48px;text-align:right;}
.pf-badge{background:linear-gradient(135deg,#ffd700,#ff9500);color:#000;font-weight:900;font-size:.65rem;padding:2px 6px;border-radius:6px;margin-left:4px;vertical-align:middle;}

.spinner{font-size:3.5rem;animation:spin 1.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.av-grid{display:flex;gap:14px;justify-content:center;margin:16px 0;}
.av-opt{font-size:2.3rem;cursor:pointer;padding:10px;border:3px solid transparent;border-radius:50%;transition:all .18s;}
.av-opt.sel{border-color:#9333ea;background:rgba(147,51,234,.14);}
.av-opt:hover{transform:scale(1.12);}

.pg-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;gap:12px;}
.p-q{font-size:1.4rem;font-weight:700;text-align:center;line-height:1.45;padding:20px;background:rgba(255,255,255,.75);border:1px solid rgba(147,51,234,.15);border-radius:16px;width:100%;max-width:480px;}
.ox-row{display:flex;gap:20px;justify-content:center;}
.p-sel-info{font-size:1rem;color:rgba(109,40,217,.55);min-height:24px;}
.rev-ok{color:#4CAF50;font-size:1.2rem;font-weight:700;}
.rev-no{color:#f44336;font-size:1.2rem;font-weight:700;}
.pres .big-av{font-size:4.5rem;}
.pres .pname{font-size:1.8rem;font-weight:900;margin:8px 0;}
.pres .pscore{font-size:2.8rem;font-weight:900;color:#9333ea;margin:8px 0;}
.pres .prank{color:rgba(109,40,217,.55);font-size:1rem;margin-bottom:16px;}
.pf-big{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#9333ea,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* 초기화 확인 모달 */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:500;display:none;}
.confirm-box{background:rgba(245,240,255,.98);border:1px solid rgba(147,51,234,.3);border-radius:20px;padding:28px;text-align:center;max-width:320px;width:90%;}
.confirm-box h3{font-size:1.2rem;margin-bottom:10px;color:#1e1b4b;}
.confirm-box p{color:rgba(109,40,217,.6);font-size:.9rem;margin-bottom:20px;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}

@media(max-width:480px){
  .title{font-size:1.8rem;}
  .q-text,.p-q{font-size:1.15rem;}
  .room-code{font-size:3rem;}
  .subj-grid{grid-template-columns:1fr 1fr;}
  .mode-grid{grid-template-columns:1fr;}
  .timer{font-size:3rem;}
  .field{height:200px;}
  .mc .em{font-size:1.4rem;}
}
</style>
</head>
<body>

<!-- 선생님: 설정 -->
<div id="scrHostSetup" class="screen active">
<div class="center">
  <div class="title" style="margin-bottom:4px;"><span style="-webkit-text-fill-color:initial">🎮</span> 게임 설정</div>
  <div class="sub" style="margin-bottom:12px;">과목 선택</div>
  <div class="subj-grid">
    <div class="subj-btn" onclick="selSubject('korean',this)">
      <span class="subj-em">📚</span>
      국어<br><small style="font-weight:400;opacity:.65;font-size:.82rem;">음운 변동</small>
    </div>
    <div class="subj-btn" onclick="selSubject('art',this)">
      <span class="subj-em">🎨</span>
      미술<br><small style="font-weight:400;opacity:.65;font-size:.82rem;">디자인</small>
    </div>
  </div>
  <div class="sub" style="margin-top:8px;margin-bottom:10px;">문제 수</div>
  <div class="cnt-grid" style="margin:0;">
    <div class="cnt-btn" onclick="selCount(10,this)">10개</div>
    <div class="cnt-btn" onclick="selCount(20,this)">20개</div>
    <div class="cnt-btn" onclick="selCount(30,this)">30개</div>
  </div>
  <div style="display:flex;gap:10px;margin-top:14px;width:100%;max-width:360px;">
    <button class="btn btn-ghost" style="white-space:nowrap;padding:15px 22px;font-size:1rem;" onclick="location.reload()">↺ 처음으로</button>
    <button class="btn btn-pri" style="flex:1;white-space:nowrap;font-size:1.1rem;padding:15px 0;" onclick="createRoom()">🚀 방 만들기</button>
  </div>
</div>
</div>

<!-- 선생님: 대기실 -->
<div id="scrHostLobby" class="screen">
<div class="center">
  <div class="title" style="margin-bottom:10px;"><span style="-webkit-text-fill-color:initial">📡</span> 대기실</div>
  <div style="display:flex;align-items:center;gap:16px;width:100%;max-width:420px;background:rgba(255,255,255,.75);border:1px solid rgba(147,51,234,.22);border-radius:16px;padding:14px 18px;">
    <div id="qrBox" style="flex-shrink:0;"></div>
    <div style="text-align:left;min-width:0;">
      <div style="color:rgba(109,40,217,.6);font-size:.78rem;margin-bottom:2px;">방 코드</div>
      <div class="room-code" id="dispCode" style="font-size:2.8rem;letter-spacing:.12em;">----</div>
      <div style="color:rgba(109,40,217,.5);font-size:.72rem;margin-top:4px;line-height:1.3;">학생들에게 이 코드를<br>알려주세요</div>
    </div>
  </div>
  <div class="sub" style="margin:10px 0 4px;">참가 <span id="pCount">0</span>명</div>
  <div class="player-list" id="lobbyList"></div>
  <div style="display:flex;gap:10px;margin-top:10px;width:100%;max-width:360px;">
    <button class="btn btn-ghost" style="white-space:nowrap;padding:14px 18px;font-size:.95rem;" onclick="confirmReset()">❌ 방 닫기</button>
    <button class="btn btn-pri" style="flex:1;white-space:nowrap;font-size:1.05rem;padding:14px 0;" onclick="startGame()">▶ 게임 시작!</button>
  </div>
</div>
</div>

<!-- 선생님: 게임 -->
<div id="scrHostGame" class="screen">
<div id="hostGame">
  <div class="hg-top">
    <div class="q-info" id="hqInfo">문제 1/10</div>
    <div class="timer" id="hTimer">10</div>
    <div class="ans-cnt" id="hAnsCnt">0명 답변</div>
  </div>
  <div class="prog"><div class="prog-fill" id="hProg" style="width:0%"></div></div>
  <div class="q-text" id="hQuestion">로딩 중...</div>

  <div class="field">
    <div class="field-bg">
      <div class="fo-bg"></div>
      <div class="fx-bg"></div>
    </div>
    <div class="f-label f-label-o">O</div>
    <div class="f-label f-label-x">X</div>
    <div class="field-center-line"></div>
    <div id="miniContainer"></div>
  </div>

  <!-- 미선택 대기줄 -->
  <div id="pendingRow"></div>

  <!-- 정답 공개 배너 -->
  <div id="revealBanner" style="display:none;text-align:center;padding:14px 20px;margin-bottom:10px;border-radius:16px;border:3px solid;"></div>

  <div class="host-btns" id="hostBtns">
    <button class="btn btn-reveal" id="btnReveal" onclick="revealAnswer()" style="display:none;">🎯 정답 공개</button>
    <button class="btn btn-next" id="btnNext" onclick="nextQuestion()" style="display:none;">다음 문제 →</button>
    <button class="btn btn-danger" onclick="confirmReset()" style="padding:14px 20px;font-size:.9rem;">⏹ 게임 종료</button>
  </div>
</div>
</div>

<!-- 선생님: 결과 -->
<div id="scrHostResult" class="screen">
<div class="center">
  <div class="title"><span style="-webkit-text-fill-color:initial">🏆</span> 최종 결과!</div>
  <div id="podiumWrap">
    <div class="sub" id="podiumLabel">순위 시상대 🏅</div>
    <div class="podium" id="podiumEl"></div>
  </div>
  <div class="sub" style="margin-top:20px;">📊 전체 순위</div>
  <div class="stats" id="statsEl"></div>
  <button class="btn btn-pri" style="margin-top:26px;" onclick="resetGame()">🔄 새 게임</button>
</div>
</div>

<!-- 학생: 입장 -->
<div id="scrPlayerJoin" class="screen">
<div class="center">
  <div class="title"><span style="-webkit-text-fill-color:initial">🎮</span> 참여하기</div>
  <div class="card">
    <div style="margin-bottom:16px;"><label>방 코드</label>
      <input class="inp" id="inpCode" placeholder="방 코드 4자리" maxlength="6" style="text-align:center;letter-spacing:.2em;font-size:1.4rem;font-weight:900;text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div style="margin-bottom:16px;"><label>내 이름</label>
      <input class="inp" id="inpName" placeholder="이름 (최대 5자)" maxlength="5">
    </div>
    <div><label style="text-align:center;">캐릭터 선택</label>
      <div class="av-grid">
        <div class="av-opt sel" onclick="selAv(0,this)">🐱</div>
        <div class="av-opt" onclick="selAv(1,this)">🐶</div>
        <div class="av-opt" onclick="selAv(2,this)">🐰</div>
        <div class="av-opt" onclick="selAv(3,this)">🐹</div>
        <div class="av-opt" onclick="selAv(4,this)">🦊</div>
      </div>
    </div>
    <button class="btn btn-pri" style="width:100%;margin-top:10px;font-size:1.05rem;" onclick="joinRoom()">입장하기 🚪</button>
  </div>
</div>
</div>

<!-- 학생: 대기 -->
<div id="scrPlayerWait" class="screen">
<div class="center">
  <div class="spinner">⏳</div>
  <div class="title" style="font-size:1.7rem;">잠깐만요!</div>
  <div class="sub">선생님이 게임을 시작할 때까지 기다려요</div>
  <div id="waitInfo" style="font-size:1.2rem;margin-top:16px;"></div>
</div>
</div>

<!-- 학생: 게임 -->
<div id="scrPlayerGame" class="screen">
<div class="pg-wrap">
  <div class="q-info" id="pqInfo">문제 1/10</div>
  <div class="timer" id="pTimer">10</div>
  <div class="p-q" id="pQuestion">로딩 중...</div>
  <div class="ox-row" id="oxRow">
    <button class="btn btn-o" id="btnO" onclick="submitAns('O')">⭕</button>
    <button class="btn btn-x" id="btnX" onclick="submitAns('X')">❌</button>
  </div>
  <div id="selInfo" class="p-sel-info"></div>
  <div id="revDisp" style="display:none;margin-top:4px;"></div>
</div>
</div>

<!-- 학생: 결과 -->
<div id="scrPlayerResult" class="screen">
<div class="center">
  <div class="title"><span style="-webkit-text-fill-color:initial">🎉</span> 게임 끝!</div>
  <div class="pres" id="pResult"></div>
</div>
</div>

<!-- 종료 확인 모달 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>⚠️ 게임을 종료하시겠어요?</h3>
    <p>모든 학생 데이터가 삭제되고<br>처음 화면으로 돌아갑니다.</p>
    <div class="confirm-btns">

function playCheer(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-18;comp.ratio.value=3;comp.knee.value=10;
    comp.attack.value=0.005;comp.release.value=0.15;
    comp.connect(ctx.destination);
    function bell(f,t,vol,dur){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g);g.connect(comp);
      o.start(t);o.stop(t+dur+0.15);
    }
    const n=ctx.currentTime;
    [523,659,784,1047,1319].forEach((f,i)=>bell(f,n+i*0.12,0.26,0.65));
    // 화음 — 18ms씩 시차를 두어 컴프레서 과부하 방지
    [523,659,784,1047].forEach((f,i)=>bell(f,n+0.7+i*0.018,0.14,1.1));
  }catch(e){}
}

// ─── 미니미 위치 계산 ───
function initPositions(playerIds){
  playerPositions={};
  playerIds.sort().forEach((pid,i)=>{
    playerPositions[pid]={row:Math.floor(i/5), col:i%5};
  });
}

function getMiniPosition(pid, answer){
  const pos=playerPositions[pid];
  if(!pos)return{left:'50%',top:'50%'};
  const {row, col}=pos;
  const totalRows=Math.ceil(Object.keys(playerPositions).length/5);
  const rowSpacing=totalRows<=2?40:Math.min(40,80/totalRows);
  const topPct=15+row*rowSpacing;
  let leftPct;
  if(answer==='O'){
    leftPct=4+col*8;
  } else if(answer==='X'){
    leftPct=60+col*8;
  } else {
    leftPct=42+col*4;
  }
  return{left:leftPct+'%', top:topPct+'%'};
}

// ─── 미니미 DOM 관리 ───
function initMiniDom(players){
  $('miniContainer').innerHTML='';
  $('pendingRow').innerHTML='';
  Object.entries(players).forEach(([pid,p])=>{
    const el=document.createElement('div');
    el.className='mc';
    el.id='mc-'+pid;
    el.innerHTML=`<div class="em">${AV[p.avatar]}</div><div class="mn">${p.name}</div>`;
    $('pendingRow').appendChild(el);
  });
  prevAnswers={};
}

function updateMiniPositions(players, qIdx, revealed, correctBool){
  if(!players)return;
  const fieldCont=$('miniContainer');
  const pendCont=$('pendingRow');
  Object.entries(players).forEach(([pid,p])=>{
    const el=document.getElementById('mc-'+pid);
    if(!el)return;
    const ans=p.answers&&p.answers[qIdx]!==undefined?p.answers[qIdx]:null;

    if(ans===null){
      if(el.parentElement!==pendCont){
        el.style.left='';el.style.top='';
        pendCont.appendChild(el);
      }
    } else {
      if(el.parentElement!==fieldCont){
        fieldCont.appendChild(el);
      }
      const pos=getMiniPosition(pid, ans);
      el.style.left=pos.left;
      el.style.top=pos.top;
    }

    const prev=prevAnswers[pid];
    if(prev!==ans && ans!==null && prev!==undefined){
      const oldDot=el.querySelector('.changed-dot');
      if(oldDot)oldDot.remove();
      const dot=document.createElement('div');
      dot.className='changed-dot';
      el.appendChild(dot);
      setTimeout(()=>dot.remove(),1500);
    }
    prevAnswers[pid]=ans;

    if(revealed){
      const ca=correctBool?'O':'X';
      el.classList.toggle('cel', ans!==null && ans===ca);
      el.classList.toggle('out', ans!==null && ans!==ca);
    } else {
      el.classList.remove('cel','out');
    }
  });
}

// ─── 선생님: 게임 구독 ───
function subHostGame(){
  if(gameUnsub)gameUnsub();
  gameUnsub=onValue(ref(db,`rooms/${roomCode}`),snap=>{
    const d=snap.val();if(!d)return;
    const{phase,currentQ,totalQ,questionIds,subject:subj,players,timerStart}=d;
    if(phase==='result'){showHostResult(players,totalQ);return;}
    const qObj=QDB[subj][questionIds[currentQ]];
    $('hqInfo').textContent=`문제 ${currentQ+1} / ${totalQ}`;
    $('hQuestion').textContent=qObj.q;
    $('hProg').style.width=`${(currentQ/totalQ)*100}%`;
    $('btnReveal').style.display=phase==='question'?'inline-block':'none';
    $('btnNext').style.display=phase==='reveal'?'inline-block':'none';
    $('btnNext').textContent=currentQ+1>=totalQ?'🏆 결과 보기':'다음 문제 →';

    // 정답 공개 배너
    const revBanner=$('revealBanner');
    if(phase==='reveal'){
      const ca=qObj.a?'O':'X';
      revBanner.style.display='block';
      revBanner.style.background=ca==='O'?'rgba(76,175,80,.3)':'rgba(244,67,54,.3)';
      revBanner.style.borderColor=ca==='O'?'#4CAF50':'#f44336';
      revBanner.innerHTML=`<div style="font-size:3.8rem;line-height:1">${ca==='O'?'⭕':'❌'}</div><div style="font-size:1.1rem;font-weight:700;margin-top:6px;opacity:.9">정답은 <strong>${ca}</strong> 입니다!</div>`;
      startSparkles();
    } else {
      revBanner.style.display='none';
      stopSparkles();
    }

    if(players&&!document.getElementById('mc-'+Object.keys(players)[0])){
      initPositions(Object.keys(players));
      initMiniDom(players);
    }
    updateMiniPositions(players, currentQ, phase==='reveal', qObj.a);

    if(players){
      const tot=Object.keys(players).length;
      const ans=Object.values(players).filter(p=>p.answers&&p.answers[currentQ]!==undefined).length;
      $('hAnsCnt').textContent=`${ans}/${tot}명 답변`;
    }
    if(phase==='question'){
      clearInterval(timerIv);
      const tick=()=>{
        const left=Math.max(0,10-(Date.now()-timerStart)/1000);
        const n=Math.ceil(left);
        $('hTimer').textContent=n;
        $('hTimer').classList.toggle('urg',n<=3);
        if(left<=0){clearInterval(timerIv);revealAnswer();}
      };
      tick();timerIv=setInterval(tick,400);
    } else {
      clearInterval(timerIv);$('hTimer').textContent='';$('hTimer').classList.remove('urg');
    }
  });
}

window.revealAnswer=async()=>{
  clearInterval(timerIv);playCheer();
  const snap=await get(ref(db,`rooms/${roomCode}`));
  const d=snap.val();
  const{subject:subj,questionIds,currentQ,players}=d;
  const correct=QDB[subj][questionIds[currentQ]].a;
  const ca=correct?'O':'X';
  await update(ref(db,`rooms/${roomCode}`),{phase:'reveal'});
  if(players){
    const upd={};
    Object.entries(players).forEach(([pid,p])=>{
      const a=p.answers&&p.answers[currentQ]!==undefined?p.answers[currentQ]:null;
      const ok=a===ca;
      upd[`players/${pid}/score`]=(p.score||0)+(ok?1:0);
      upd[`players/${pid}/streak`]=ok?(p.streak||0)+1:0;
    });
    await update(ref(db,`rooms/${roomCode}`),upd);
  }
};

window.nextQuestion=async()=>{
  stopSparkles();
  $('miniContainer').innerHTML='';
  $('pendingRow').innerHTML='';
  const snap=await get(ref(db,`rooms/${roomCode}`));
  const d=snap.val();
  const next=d.currentQ+1;
  if(next>=d.totalQ){
    const ps=d.players||{};const upd={};
    Object.entries(ps).forEach(([pid,p])=>{upd[`players/${pid}/perfect`]=(p.score||0)===d.totalQ;});
    await update(ref(db,`rooms/${roomCode}`),upd);
    await update(ref(db,`rooms/${roomCode}`),{phase:'result'});
  } else {
    prevAnswers={};
    await update(ref(db,`rooms/${roomCode}`),{currentQ:next,phase:'question',timerStart:Date.now()});
  }
};

function showHostResult(players,totalQ){
  clearInterval(timerIv);stopSparkles();show('scrHostResult');
  if(!players)return;
  const list=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
  $('podiumLabel').textContent='순위 시상대 🏅';
  const top3=list.slice(0,3);
  const order=top3.length>=2?[top3[1],top3[0],top3[2]]:top3.length===1?[null,top3[0],null]:[null,null,null];
  const blocks=[{cls:'pd2',m:'🥈',h:88},{cls:'pd1',m:'🥇',h:120},{cls:'pd3',m:'🥉',h:68}];
  $('podiumEl').innerHTML=order.map((p,i)=>{
    if(!p)return'';
    return`<div class="pd-slot"><div class="pd-chars"><div class="mc${i===1?' cel':''}" style="position:static;transform:none;"><div class="em">${AV[p.avatar]}</div><div class="mn">${p.name}</div></div></div><div class="pd-block ${blocks[i].cls}" style="height:${blocks[i].h}px">${blocks[i].m}</div></div>`;
  }).join('');
  $('statsEl').innerHTML=list.map((p,i)=>{
    const pct=totalQ>0?Math.round(((p.score||0)/totalQ)*100):0;
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return`<div class="st-row"><div class="st-rank">${medal||(i+1)}</div><div class="st-av">${AV[p.avatar]}</div><div class="st-name">${p.name}${p.perfect?'<span class="pf-badge">퍼펙트!</span>':''}</div><div class="st-bar"><div class="st-fill" style="width:${pct}%"></div></div><div class="st-sc">${p.score||0}/${totalQ}</div></div>`;
  }).join('');
}

// ─── 초기화 ───
window.confirmReset=()=>{$('confirmOverlay').style.display='flex';};
window.closeConfirm=()=>{$('confirmOverlay').style.display='none';};
window.resetGame=async()=>{
  $('confirmOverlay').style.display='none';
  if(roomCode)await remove(ref(db,`rooms/${roomCode}`));
  if(gameUnsub)gameUnsub();clearInterval(timerIv);stopSparkles();
  roomCode='';subject=null;qCount=10;playerPositions={};prevAnswers={};
  document.querySelectorAll('.subj-btn,.cnt-btn').forEach(b=>b.classList.remove('sel'));
  updateTitle();
  show('scrHostSetup');
};

// ─── 학생 ───
window.selAv=(n,el)=>{myAv=n;document.querySelectorAll('.av-opt').forEach((e,i)=>e.classList.toggle('sel',i===n));};

window.joinRoom=async()=>{
  const code=$('inpCode').value.trim().toUpperCase();
  const name=$('inpName').value.trim();
  if(code.length<4){toast('방 코드를 입력하세요!');return;}
  if(!name){toast('이름을 입력하세요!');return;}
  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){toast('방을 찾을 수 없어요!');return;}
  if(snap.val().phase!=='lobby'){toast('이미 게임이 시작됐어요!');return;}
  roomCode=code;
  const pRef=push(ref(db,`rooms/${roomCode}/players`));
  playerId=pRef.key;
  await set(pRef,{name,avatar:myAv,score:0,streak:0,perfect:false,joinedAt:Date.now()});
  $('waitInfo').innerHTML=`${AV[myAv]} ${name}`;
  subPlayerGame();show('scrPlayerWait');
};

function subPlayerGame(){
  onValue(ref(db,`rooms/${roomCode}`),snap=>{
    const d=snap.val();if(!d)return;
    const{phase,currentQ,totalQ,questionIds,subject:subj,timerStart}=d;
    if(phase==='lobby'){show('scrPlayerWait');return;}
    if(phase==='result'){showPlayerResult(d.players,totalQ);return;}
    const qObj=QDB[subj][questionIds[currentQ]];
    $('pqInfo').textContent=`문제 ${currentQ+1} / ${totalQ}`;
    $('pQuestion').textContent=qObj.q;
    const myA=myAnswers[currentQ];

    if(phase==='question'){
      $('oxRow').style.display='flex';
      $('btnO').classList.toggle('picked',myA==='O');
      $('btnX').classList.toggle('picked',myA==='X');
      $('selInfo').textContent=myA?`선택: ${myA==='O'?'⭕':'❌'} (바꿀 수 있어요)`:'';
      $('revDisp').style.display='none';
      clearInterval(timerIv);
      const tick=()=>{
        const left=Math.max(0,10-(Date.now()-timerStart)/1000);
        const n=Math.ceil(left);
        $('pTimer').textContent=n;
        $('pTimer').classList.toggle('urg',left<=3);
        if(left<=0)clearInterval(timerIv);
      };
      tick();timerIv=setInterval(tick,400);
    }
    if(phase==='reveal'){
      clearInterval(timerIv);$('pTimer').textContent='';
      const ca=qObj.a?'O':'X';
      $('oxRow').style.display='none';
      $('selInfo').textContent='';
      $('revDisp').style.display='block';
      const isOk=myA===ca;
      $('revDisp').innerHTML=`<div style="font-size:3rem;margin-bottom:8px;">${ca==='O'?'⭕':'❌'}</div>`+(myA?`<div class="${isOk?'rev-ok':'rev-no'}">${isOk?'✅ 맞았어요!':'💔 틀렸어요'}</div>`:'<div class="rev-no">⏰ 시간 초과</div>');
    }
    show('scrPlayerGame');
  });
}

window.submitAns=async(ans)=>{
  const snap=await get(ref(db,`rooms/${roomCode}`));
  const d=snap.val();
  if(!d||d.phase!=='question')return;
  const qi=d.currentQ;
  myAnswers[qi]=ans;
  $('btnO').classList.toggle('picked',ans==='O');
  $('btnX').classList.toggle('picked',ans==='X');
  $('selInfo').textContent=`선택: ${ans==='O'?'⭕':'❌'} (바꿀 수 있어요)`;
  await update(ref(db,`rooms/${roomCode}/players/${playerId}/answers`),{[qi]:ans});
};

function showPlayerResult(players,totalQ){
  clearInterval(timerIv);show('scrPlayerResult');
  if(!players||!players[playerId])return;
  const me=players[playerId];
  const list=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
  const rank=list.findIndex(p=>p.name===me.name)+1;
  $('pResult').innerHTML=`
    <div class="big-av">${AV[me.avatar]}</div>
    <div class="pname">${me.name}</div>
    <div class="pscore">${me.score||0} / ${totalQ}점</div>
    <div class="prank">전체 ${list.length}명 중 ${rank}등</div>
    ${me.perfect?'<div class="pf-big">🏆 퍼펙트 스코어!</div>':''}
  `;
}

// ─── URL 자동 분기 ───
(()=>{
  updateTitle();
  const room=new URLSearchParams(location.search).get('room');
  if(room){$('inpCode').value=room.toUpperCase();$('inpName').focus();show('scrPlayerJoin');}
})();
</script>
